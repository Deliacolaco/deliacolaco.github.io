<div class="row justify-content-center align-items-center p-4 landing-split hero-fade-in">
  <div class="col-lg-11 col-md-11 mt-5 mx-auto">
    <div class="landing-content">

      <!-- Profile Photo -->
      <div class="landing-photo">
        <div class="avatar-container">
          {% if site.author.image %}
            <img class="home__img mx-auto" src="{{ site.author.image }}" alt="{{ site.author.name }} profile photo">
          {% else %}
            <img class="img-fluid rounded-circle shadow-lg mx-auto" src="https://ui-avatars.com/api/?name={{ site.title }}&background=random" alt="{{ site.title }}" style="object-fit: cover;">
          {% endif %}
        </div>
      </div>

      <!-- Landing Text and Links -->
      <div class="landing-text">
        <h1 class="landing-name wow animated slideInUp" data-wow-delay=".1s">
          {{ site.author.name }}
        </h1>
        <p class="landing-role wow animated slideInUp" data-wow-delay=".12s">
          Portfolio
        </p>
        <p class="landing-subtitle text-muted wow animated slideInUp typewriter-tagline" data-wow-delay=".15s">
          {{ site.description }}
        </p>

        <div class="mt-4 d-flex justify-content-start wow animated slideInUp landing-buttons hero-buttons" data-wow-delay=".2s">
          <a class="btn btn-outline-dark btn-lg d-flex align-items-center hero-button resume wow animated slideInUp" data-wow-delay=".3s" href="/resume.pdf" target="_blank" rel="noopener noreferrer">
            <i class="fas fa-file-pdf" style="margin-right: 8px;"></i>
            <span>Resume</span>
          </a>
          <a class="btn btn-outline-dark btn-lg d-flex align-items-center hero-button github wow animated slideInUp" data-wow-delay=".4s" href="https://github.com/deliacolaco" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-github" style="margin-right: 8px;"></i>
            <span>GitHub</span>
          </a>
          <a class="btn btn-outline-dark btn-lg d-flex align-items-center hero-button linkedin wow animated slideInUp" data-wow-delay=".5s" href="https://www.linkedin.com/in/deliacolaco/" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-linkedin-in" style="margin-right: 8px;"></i>
            <span>LinkedIn</span>
          </a>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Scroll Down Arrow -->
<div class="text-center mt-4">
  <div class="scroll-down" id="scrollArrow" onclick="scrollToAbout()">
    <i class="fas fa-chevron-down"></i>
  </div>
</div>
